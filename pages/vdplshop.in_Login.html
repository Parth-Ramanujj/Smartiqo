<script>
(function() {
    // 1. Client-side Route Guard for Production/Vercel static hosting
    const handleRouteGuard = () => {
        const path = window.location.pathname;
        const isLoginPage = path.toLowerCase().startsWith('/login') || path.toLowerCase().includes('login.html');
        const isDashboard = path === '/' || path.toLowerCase().startsWith('/dashboards') || path.toLowerCase().includes('dashboard');
        
        // Simple cookie check
        const cookies = document.cookie.split(';').map(c => c.trim());
        const hasSession = cookies.some(c => c.startsWith('logged_in=yes'));
        
        if (isDashboard && !hasSession) {
            window.location.href = '/Login';
        } else if (isLoginPage && hasSession) {
            window.location.href = '/';
        }
    };
    handleRouteGuard();

    const style = document.createElement('style');
    style.innerHTML = `
        #upgrade-switchcraft-button { display: none !important; }
        button:has(.cart-badge) { display: none !important; }
        .cart-badge { display: none !important; }
        .topbar { display: none !important; }
    `;
    document.head.appendChild(style);

    const removeRoyalEdge = () => {
        const xpath = "//*[contains(text(), 'Royal Edge') or contains(text(), 'royal edge') or contains(text(), 'ROYAL EDGE')]";
        const result = document.evaluate(xpath, document, null, XPathResult.UNORDERED_NODE_SNAPSHOT_TYPE, null);
        for (let i = 0; i < result.snapshotLength; i++) {
            const node = result.snapshotItem(i);
            let target = node;
            if (node.tagName === 'SPAN' || node.tagName === 'H2' || node.tagName === 'H3' || node.tagName === 'H4' || node.tagName === 'H5' || node.tagName === 'P') {
                let parent = node.parentElement;
                while (parent && !['BUTTON', 'DIV'].includes(parent.tagName)) {
                    parent = parent.parentElement;
                }
                if (parent && parent.tagName === 'BUTTON') {
                    target = parent;
                }
            }
            if (target && target.style.display !== 'none') {
                target.style.setProperty('display', 'none', 'important');
            }
        }
    };

    const replaceBranding = () => {
        const walk = document.createTreeWalker(document.body, NodeFilter.SHOW_TEXT, null, false);
        let node;
        while (node = walk.nextNode()) {
            if (node.nodeValue.includes('YantraMayaa Designs')) {
                node.nodeValue = node.nodeValue.replace(/YantraMayaa Designs/g, 'SmartIQO Technologies');
            }
            if (node.nodeValue.includes('SwitchCraft')) {
                node.nodeValue = node.nodeValue.replace(/SwitchCraft/g, 'SmartiQo');
            }
        }
    };

    const removeAutoAI = () => {
        const pTags = document.querySelectorAll('p');
        pTags.forEach(el => {
            if (el.textContent.includes("Auto (AI) Mode") && el.classList.contains('text-indigo-600')) {
                let card = el.parentElement;
                while (card && !card.classList.contains('rounded-2xl')) {
                    card = card.parentElement;
                }
                if (card) {
                    card.style.setProperty('display', 'none', 'important');
                    if (card.parentElement && card.parentElement.classList.contains('px-4')) {
                        card.parentElement.style.setProperty('display', 'none', 'important');
                    }
                }
            }
        });

        const inputs = document.querySelectorAll('input');
        inputs.forEach(input => {
            const label = input.getAttribute('aria-label') || '';
            if (label.includes("Auto (AI) Mode") || label.includes("Auto (AI) mode")) {
                let parent = input.parentElement;
                while (parent) {
                    if (parent.tagName === 'DIV' && parent.getAttribute('role') === 'button') {
                        parent.style.setProperty('display', 'none', 'important');
                        break;
                    }
                    parent = parent.parentElement;
                }
            }
        });
    };

    const removeLiveTutorial = () => {
        const xpath = "//*[contains(text(), 'Live Tutorial') or contains(text(), 'live tutorial') or contains(text(), 'LIVE TUTORIAL')]";
        const result = document.evaluate(xpath, document, null, XPathResult.UNORDERED_NODE_SNAPSHOT_TYPE, null);
        for (let i = 0; i < result.snapshotLength; i++) {
            const node = result.snapshotItem(i);
            let target = node;
            if (node.tagName === 'SPAN' || node.tagName === 'DIV' || node.tagName === 'BUTTON') {
                let parent = node.parentElement;
                while (parent && !['BUTTON', 'A'].includes(parent.tagName)) {
                    parent = parent.parentElement;
                }
                if (parent) {
                    target = parent;
                }
            }
            if (target && target.style.display !== 'none') {
                target.style.setProperty('display', 'none', 'important');
            }
        }
    };

    const runAll = () => {
        handleRouteGuard();
        removeRoyalEdge();
        replaceBranding();
        removeAutoAI();
        removeLiveTutorial();
    };

    if (document.body) {
        runAll();
        const observer = new MutationObserver(runAll);
        observer.observe(document.documentElement, { childList: true, subtree: true });
    } else {
        window.addEventListener('DOMContentLoaded', () => {
            runAll();
            const observer = new MutationObserver(runAll);
            observer.observe(document.documentElement, { childList: true, subtree: true });
        });
    }
})();
</script>

    btn.onclick = function(e){ e.stopPropagation(); window.location.href='/orders?tab=cart'; };
    par.insertBefore(btn, bell);
    return true;
  }
  // MutationObserver approach - most reliable for SPA
  var obs = new MutationObserver(function(){ inject(); });
  obs.observe(document.documentElement, {childList:true, subtree:true});
  // Also poll for the first 30s as a safety net
  var t = setInterval(function(){ inject(); }, 250);
  setTimeout(function(){ clearInterval(t); }, 30000);
  if(document.readyState!=='loading'){ inject(); }
  else { document.addEventListener('DOMContentLoaded', inject); }
})();
</script>
